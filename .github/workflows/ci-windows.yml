name: Build LibrePods Windows (BLE-only fork)

# This fork builds only the Windows BLE-only tray client. The full AACP control
# channel does not work on Windows because the OS blocks userspace L2CAP socket
# access (see docs/windows-porting-progress.md and
# experiments/windows-feasibility/RESULTS.md for the exhaustive probe results).

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'windows/**'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'linux/CMakeLists.txt'
      - 'linux/ble/**'
      - 'linux/platform/windows/**'
      - 'linux/tests/windows_*'
      - '.github/workflows/ci-windows.yml'

permissions:
  contents: write   # for creating GitHub releases on tag push

jobs:
  build-windows:
    name: Build Windows tray + diagnostic probes
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt 6.8.3 (msvc2022_64)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtshadertools'
          cache: true

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -S linux -B build/windows -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="%QT_ROOT_DIR%"

      - name: Build all Windows targets
        shell: cmd
        run: cmake --build build/windows --config Release

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $stage = "stage/librepods-windows"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          New-Item -ItemType Directory -Force -Path "$stage/probes" | Out-Null

          # Main user-facing app
          Copy-Item "build/windows/librepods-windows-tray-mvp.exe" "$stage/librepods-tray.exe"

          # Diagnostic probes (for users investigating their own setup)
          Copy-Item "build/windows/librepods-windows-aacp-probe.exe"        "$stage/probes/"
          Copy-Item "build/windows/librepods-windows-hci-ioctl-probe.exe"   "$stage/probes/"
          Copy-Item "build/windows/librepods-windows-bredr-l2cap-probe.exe" "$stage/probes/"
          Copy-Item "build/windows/librepods-windows-ble-scanner-smoke.exe" "$stage/probes/"
          Copy-Item "build/windows/librepods-ble-parser-smoke.exe"          "$stage/probes/"

          # Run windeployqt to bundle Qt runtime DLLs alongside the tray exe
          & "$env:QT_ROOT_DIR/bin/windeployqt.exe" `
            --release `
            --no-translations `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            --qmldir linux/platform/windows/qml `
            "$stage/librepods-tray.exe"

          # Top-level note explaining what's in the package
          Copy-Item "docs/windows-porting-progress.md" "$stage/PORTING-NOTES.md"
          Copy-Item "experiments/windows-feasibility/RESULTS.md" "$stage/PROBE-RESULTS.md"

      - name: Upload Windows BLE tray bundle
        uses: actions/upload-artifact@v4
        with:
          name: librepods-windows-ble-tray
          path: stage/librepods-windows
          if-no-files-found: error
          retention-days: 30

      - name: Pack release archive
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "librepods-windows-ble-$tag.zip"
          Compress-Archive -Path "stage/librepods-windows/*" -DestinationPath $zip
          Write-Host "Created $zip"
          "ZIP_PATH=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## LibrePods Windows BLE-only fork — ${{ github.ref_name }}

            Tray app for AirPods on Windows. **BLE-only**: battery, in-ear detection, proximity. Active control (noise mode, etc.) does not work on Windows due to OS-level L2CAP restrictions — see [`PROBE-RESULTS.md`](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/experiments/windows-feasibility/RESULTS.md) for the evidence trail.

            ### Install
            1. Download `librepods-windows-ble-${{ github.ref_name }}.zip`
            2. Extract anywhere
            3. Run `librepods-tray.exe`

            ### Want full functionality?
            - Use the [original Linux/Android client](https://github.com/kavishdevar/librepods)
            - Or follow the [WSL2 + usbipd guide](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/docs/wsl2-usbipd-guide.md) (requires external USB Bluetooth dongle)
