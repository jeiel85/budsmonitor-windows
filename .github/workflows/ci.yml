name: CI

# Builds and tests the .NET 10 BudsMonitor solution. Windows-hosted because the app
# targets WPF + WinRT. This workflow never creates GitHub releases — releases are made
# manually (see scripts/publish-portable.ps1) so CI can't clobber them.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore src/BudsMonitor.sln

      - name: Build
        run: dotnet build src/BudsMonitor.sln -c Release --no-restore

      - name: Test
        run: dotnet test src/BudsMonitor.sln -c Release --no-build --verbosity minimal

  portable:
    name: Portable build (tags only)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish self-contained portable build
        shell: pwsh
        run: pwsh -File scripts/publish-portable.ps1

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: BudsMonitor-portable-win-x64
          path: dist/BudsMonitor-portable-win-x64.zip
          if-no-files-found: error
          retention-days: 30
